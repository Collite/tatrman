name: Grammar Sync

on:
  push:
    branches: [main, v0]
    paths:
      - 'packages/grammar/src/TTR.g4'
  pull_request:
    branches: [main, v0]
    paths:
      - 'packages/grammar/src/TTR.g4'

jobs:
  grammar-sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check for ai-platform checkout
        id: ai_platform_check
        run: |
          if [ -n "$AI_PLATFORM_PATH" ] && [ -d "$AI_PLATFORM_PATH" ]; then
            echo "ai_platform_found=true" >> $GITHUB_OUTPUT
          else
            echo "ai_platform_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run grammar sync check
        if: steps.ai_platform_check.outputs.ai_platform_found == 'true'
        run: |
          bash packages/grammar/scripts/check-sync.sh "$AI_PLATFORM_PATH"
        env:
          AI_PLATFORM_PATH: ${{ vars.AI_PLATFORM_PATH }}

      - name: Skip check — ai-platform not available
        if: steps.ai_platform_check.outputs.ai_platform_found == 'false'
        run: echo "Skipped: ai-platform not available (set AI_PLATFORM_PATH secret to enable)"