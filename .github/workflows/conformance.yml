name: Conformance

# Catches TS↔Kotlin walker drift the moment either parser changes shape.
# Two parallel jobs dump the shared fixtures; the diff job compares them
# byte-for-byte after normalisation. See docs/grammar-master/architecture.md.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'packages/grammar/**'
      - 'packages/parser/**'
      - 'packages/kotlin/ttr-parser/**'
      - 'tests/conformance/**'

jobs:
  ts-dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @modeler/parser build
      - run: pnpm --filter @modeler/conformance dump
      - uses: actions/upload-artifact@v4
        with:
          name: ts-dumps
          path: tests/conformance/out-ts/

  kt-dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :packages:kotlin:ttr-parser:test --tests "*ConformanceSpec*"
      - uses: actions/upload-artifact@v4
        with:
          name: kt-dumps
          path: packages/kotlin/ttr-parser/build/conformance/kt/

  diff:
    needs: [ts-dump, kt-dump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: ts-dumps
          path: tests/conformance/out-ts/
      - uses: actions/download-artifact@v4
        with:
          name: kt-dumps
          path: packages/kotlin/ttr-parser/build/conformance/kt/
      - run: pnpm --filter @modeler/conformance diff
