name: Conformance

# Catches TS↔Kotlin drift the moment either side changes shape — both the parser
# (AST structure) and the semantics layer (resolved-reference + diagnostic sets).
# Parallel jobs dump the shared fixtures; the diff jobs compare them byte-for-byte
# after normalisation. See docs/grammar-master/.

on:
  push:
    branches: [main, v0]
  # Runs on EVERY PR (no paths filter): resolver/walker behaviour can change via
  # files outside the obvious paths (shared utils, re-exports), and a path-scoped
  # run would silently skip those — a green-by-omission gap. The jobs are fast;
  # correctness beats the saved minutes.
  pull_request:
    branches: [main, v0]

jobs:
  ts-dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @modeler/parser --filter @modeler/semantics build
      - run: pnpm --filter @modeler/conformance dump
      - run: pnpm --filter @modeler/conformance dump-sem
      # Golden-baseline gate: the committed out-ts{,-sem}/ must match what the
      # current TS code regenerates. A diff here means someone changed TS dump
      # output without committing it — regenerate locally (`pnpm --filter
      # @modeler/conformance dump-all`) and commit. This is what catches TS-side
      # drift (and co-drift) that the cross-language diff alone cannot.
      - name: Assert committed TS dumps are current
        run: |
          if ! git diff --exit-code -- tests/conformance/out-ts tests/conformance/out-ts-sem; then
            echo "::error::Committed conformance baseline is stale. Run 'pnpm --filter @modeler/conformance dump-all' and commit tests/conformance/out-ts{,-sem}/."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ts-dumps
          path: tests/conformance/out-ts/
      - uses: actions/upload-artifact@v4
        with:
          name: ts-sem-dumps
          path: tests/conformance/out-ts-sem/

  kt-dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :packages:kotlin:ttr-parser:test --tests "*ConformanceSpec*"
      - uses: actions/upload-artifact@v4
        with:
          name: kt-dumps
          path: packages/kotlin/ttr-parser/build/conformance/kt/

  kt-sem-dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :packages:kotlin:ttr-semantics:test --tests "*SemanticsConformanceSpec*"
      - uses: actions/upload-artifact@v4
        with:
          name: kt-sem-dumps
          path: packages/kotlin/ttr-semantics/build/conformance/kt-sem/

  diff:
    needs: [ts-dump, kt-dump, kt-sem-dump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: ts-dumps
          path: tests/conformance/out-ts/
      - uses: actions/download-artifact@v4
        with:
          name: ts-sem-dumps
          path: tests/conformance/out-ts-sem/
      - uses: actions/download-artifact@v4
        with:
          name: kt-dumps
          path: packages/kotlin/ttr-parser/build/conformance/kt/
      - uses: actions/download-artifact@v4
        with:
          name: kt-sem-dumps
          path: packages/kotlin/ttr-semantics/build/conformance/kt-sem/
      - run: pnpm --filter @modeler/conformance diff
      - run: pnpm --filter @modeler/conformance diff-sem

  py-dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'      # only for the ANTLR generate step; not shipped to consumers
      - name: Generate the ANTLR Python parser
        run: ./packages/python/ttr-parser/scripts/generate-python-parser.sh
      - name: Install ttr-parser (editable)
        run: pip install -e packages/python/ttr-parser
      - name: Dump fixtures → out-py/
        run: python tests/conformance/dump.py
      - uses: actions/upload-artifact@v4
        with:
          name: py-dumps
          path: tests/conformance/out-py/
      - name: Dump semantics fixtures → out-py-sem/
        run: python tests/conformance/dump_sem.py
      - uses: actions/upload-artifact@v4
        with:
          name: py-sem-dumps
          path: tests/conformance/out-py-sem/

  py-vs-ts:
    needs: [ts-dump, py-dump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ts-dumps
          path: out-ts/
      - uses: actions/download-artifact@v4
        with:
          name: py-dumps
          path: out-py/
      # Byte-for-byte: the Python AST dump must equal the (freshly regenerated) TS
      # golden on every fixture. A diff means the Python walker drifted from TS.
      - name: Diff Python dumps against TS golden
        run: |
          if ! diff -ru out-ts/ out-py/; then
            echo "::error::Python AST conformance drift vs TS golden. Run 'python tests/conformance/dump.py' locally and fix the walker/dumper (never the golden)."
            exit 1
          fi

  py-sem-vs-ts:
    needs: [ts-dump, py-dump]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ts-sem-dumps
          path: out-ts-sem/
      - uses: actions/download-artifact@v4
        with:
          name: py-sem-dumps
          path: out-py-sem/
      # Byte-for-byte: the Python semantics dump (resolved refs + portable
      # validator diagnostics + symbol qnames) must equal the TS golden on every
      # fixture — single files AND the multi-doc subdirectories. A diff means the
      # Python resolver/validator/stock drifted from TS.
      - name: Diff Python semantics dumps against TS golden
        run: |
          if ! diff -ru out-ts-sem/ out-py-sem/; then
            echo "::error::Python semantics conformance drift vs TS golden. Run 'python tests/conformance/dump_sem.py' locally and fix the resolver/validator/stock (never the golden)."
            exit 1
          fi
