name: Release extensions

# Builds the editor extensions, attaches every artifact to a GitHub Release, and
# — on a RELEASE tag — publishes to the public Marketplace. Tag-driven, mirroring
# publish.yml (Kotlin) / publish-python.yml. The `just publish vscode` /
# `just publish intellij` recipes bump the tracked version file, commit, and push
# one of these tags; this workflow then rebuilds the version-stamped artifact in a
# clean runner and ships it. The published version is always the bare X.Y.Z (from
# the committed package.json / gradle.properties at that commit).
#
# RELEASE gate (2026-07-17) — same polarity as the registry lanes:
#   • bare `<kind>/vX.Y.Z`          → INTERNAL: GitHub Release only (test installs)
#   • `<kind>/vX.Y.Z-RELEASE`       → PUBLIC:   also publishes to the Marketplace
#     (VS Code Marketplace for vscode; JetBrains Marketplace for intellij). The
#     `-RELEASE` marker is stripped before the version reaches the Marketplace.
#
# tatrman is the canonical owner of the grammar + IDE support (2026-07-17), so the
# `collite.ttr-modeler-vsc` Marketplace listing is published from HERE. modeler
# (frozen fork) must NOT also publish it — two sources for one Marketplace id
# collide. tatrman's extension version was reconciled to continue modeler's series
# (it resumes above the last modeler-published 0.9.8).
#
# Tag → artifact (Marketplace only on the -RELEASE variant):
#   vscode/vX.Y.Z[-RELEASE]    packages/vscode-ext/ttr-modeler-vsc-X.Y.Z.vsix  → VS Code Marketplace
#   intellij/vX.Y.Z[-RELEASE]  intellij-plugin/build/distributions/*-X.Y.Z.zip → JetBrains Marketplace
#
# Marketplace publishing is gated on the presence of the publisher secrets, so a
# -RELEASE tag stays green (GitHub Release only) until they're set:
#   VS Code   — VSCE_PAT
#   JetBrains — JETBRAINS_MARKETPLACE_TOKEN (+ signing: JETBRAINS_CERTIFICATE_CHAIN,
#               JETBRAINS_PRIVATE_KEY, JETBRAINS_PRIVATE_KEY_PASSWORD). See
#               PUBLISHING.md § IntelliJ Marketplace for the one-time setup.
#
# The build steps are not duplicated here — each job runs the same private `just`
# recipe (`_build-vsix` / `_build-intellij`) that `just publish vscode` /
# `just publish intellij` use locally, so CI and local builds never drift.

on:
  push:
    tags:
      - 'vscode/v*'
      - 'intellij/v*'

permissions:
  contents: write # create releases + upload assets

jobs:
  vscode:
    if: startsWith(github.ref, 'refs/tags/vscode/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: extractions/setup-just@v3

      - run: pnpm install --frozen-lockfile

      # Version + lane from the tag. Bare `vscode/vX.Y.Z` is an INTERNAL build
      # (GitHub Release only); `vscode/vX.Y.Z-RELEASE` also publishes to the
      # Marketplace. The -RELEASE marker is stripped so the built/published version
      # is always bare X.Y.Z (matching the committed package.json at that commit).
      - name: Derive version + lane from tag
        id: ver
        run: |
          RAW="${GITHUB_REF_NAME##*/v}"
          VERSION="${RAW%-RELEASE}"
          if [ "$RAW" != "$VERSION" ]; then RELEASE=true; else RELEASE=false; fi
          if [ -z "$VERSION" ]; then echo "::error::could not derive version from '$GITHUB_REF_NAME'"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag $GITHUB_REF_NAME → version $VERSION, release=$RELEASE"

      - name: Build .vsix
        run: just _build-vsix "${{ steps.ver.outputs.version }}"

      # VS Code Marketplace — RELEASE-gated: only a `-RELEASE` tag publishes here
      # (bare tags stay internal), and only when the VSCE_PAT secret is present.
      # VSCE_PAT is an Azure DevOps PAT scoped to Marketplace > Manage on "all
      # accessible organizations" — the only scope vsce's classic PAT auth
      # supports today. ⚠️ Microsoft has announced all-accessible-orgs PATs stop
      # working **December 2026** — this step will need to move to
      # `vsce publish --azure-credential` (Entra ID / OIDC, no PAT, no
      # expiration) before then. Tracked; not blocking today's setup.
      # Publishes the SAME .vsix just built (via --packagePath), not a fresh
      # vsce-driven build — keeps this identical to the artifact attached to
      # the GitHub Release below and to what `just _build-vsix` produces locally.
      - name: Publish to VS Code Marketplace
        if: ${{ steps.ver.outputs.release == 'true' && env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          cd packages/vscode-ext && pnpm exec vsce publish \
            --packagePath "ttr-modeler-vsc-${{ steps.ver.outputs.version }}.vsix"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          IS_RELEASE: ${{ steps.ver.outputs.release }}
        run: |
          if [ "$IS_RELEASE" = "true" ]; then
            NOTE="VS Code extension v${VERSION}. Published to the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=collite.ttr-modeler-vsc). Or download the \`.vsix\` below and install it via the Extensions view → ⋯ → \"Install from VSIX…\"."
          else
            NOTE="VS Code extension v${VERSION} — **internal build** (not published to the Marketplace). Download the \`.vsix\` below and install it via the Extensions view → ⋯ → \"Install from VSIX…\"."
          fi
          gh release create "$GITHUB_REF_NAME" \
            "packages/vscode-ext/ttr-modeler-vsc-${VERSION}.vsix" \
            --title "VS Code extension v${VERSION}" \
            --notes "$NOTE"

  intellij:
    if: startsWith(github.ref, 'refs/tags/intellij/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # IntelliJ plugin targets JDK 17 (build.gradle.kts: jvmToolchain(17)).
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - uses: extractions/setup-just@v3

      - run: pnpm install --frozen-lockfile

      - name: Derive version + lane from tag
        id: ver
        run: |
          RAW="${GITHUB_REF_NAME##*/v}"
          VERSION="${RAW%-RELEASE}"
          if [ "$RAW" != "$VERSION" ]; then RELEASE=true; else RELEASE=false; fi
          if [ -z "$VERSION" ]; then echo "::error::could not derive version from '$GITHUB_REF_NAME'"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag $GITHUB_REF_NAME → version $VERSION, release=$RELEASE"

      - name: Build plugin .zip
        run: just _build-intellij

      # JetBrains Marketplace — RELEASE-gated: only a `-RELEASE` tag publishes here
      # (bare tags stay internal), and only when the publish token is present.
      # `publishPlugin` (IntelliJ Platform Gradle Plugin 2.x) builds, SIGNS
      # (signPlugin — needs the three cert secrets), and uploads to the Marketplace;
      # the target version must not already be published there. ⚠️ The plugin
      # listing must be created ONCE MANUALLY (upload a .zip on the Marketplace)
      # before the first automated publish works, and the first publish goes to
      # moderation. Full setup + the secret names are in PUBLISHING.md
      # § IntelliJ Marketplace. gradle.properties pluginVersion is bare X.Y.Z at
      # the tagged commit, so publishPlugin uploads the bare version.
      - name: Publish to JetBrains Marketplace
        if: ${{ steps.ver.outputs.release == 'true' && env.PUBLISH_TOKEN != '' }}
        working-directory: intellij-plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin --no-configuration-cache

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          IS_RELEASE: ${{ steps.ver.outputs.release }}
        run: |
          ZIP=$(ls intellij-plugin/build/distributions/*-"${VERSION}".zip)
          if [ "$IS_RELEASE" = "true" ]; then
            NOTE="IntelliJ IDEA plugin v${VERSION}. Published to the [JetBrains Marketplace](https://plugins.jetbrains.com/) (first publish is pending moderation). Or download the \`.zip\` below and install it via Settings → Plugins → ⚙ → \"Install Plugin from Disk…\"."
          else
            NOTE="IntelliJ IDEA plugin v${VERSION} — **internal build** (not published to the Marketplace). Download the \`.zip\` below and install it via Settings → Plugins → ⚙ → \"Install Plugin from Disk…\"."
          fi
          gh release create "$GITHUB_REF_NAME" \
            "$ZIP" \
            --title "IntelliJ plugin v${VERSION}" \
            --notes "$NOTE"
