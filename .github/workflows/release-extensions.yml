name: Release extensions

# Builds the editor extensions, publishes the VS Code one to the VS Code
# Marketplace, and attaches every artifact to a GitHub Release — tag-driven,
# mirroring publish.yml (Kotlin → GitHub Packages). The `just publish vscode` /
# `just publish intellij` recipes bump the version, commit, and push one of these
# tags; this workflow then rebuilds the version-stamped artifact in a clean runner
# and ships it. The version comes from the tag (and matches the committed
# package.json / gradle.properties at that commit).
#
# tatrman is the canonical owner of the grammar + IDE support (2026-07-17), so the
# `collite.ttr-modeler-vsc` Marketplace listing is published from HERE. modeler
# (frozen fork) must NOT also publish it — two sources for one Marketplace id
# collide. tatrman's extension version was reconciled to continue modeler's series
# (it resumes above the last modeler-published 0.9.8).
#
# Tag → artifact:
#   vscode/v<x.y.z>     packages/vscode-ext/ttr-modeler-vsc-<x.y.z>.vsix  (+ Marketplace)
#   intellij/v<x.y.z>   intellij-plugin/build/distributions/intellij-plugin-<x.y.z>.zip
#
# The build steps are not duplicated here — each job runs the same private `just`
# recipe (`_build-vsix` / `_build-intellij`) that `just publish vscode` /
# `just publish intellij` use locally, so CI and local builds never drift.

on:
  push:
    tags:
      - 'vscode/v*'
      - 'intellij/v*'

permissions:
  contents: write # create releases + upload assets

jobs:
  vscode:
    if: startsWith(github.ref, 'refs/tags/vscode/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: extractions/setup-just@v3

      - run: pnpm install --frozen-lockfile

      - name: Build .vsix
        run: just _build-vsix "${GITHUB_REF_NAME##*/v}"

      # VS Code Marketplace (public — no GitHub repo visibility dependency).
      # VSCE_PAT is an Azure DevOps PAT scoped to Marketplace > Manage on "all
      # accessible organizations" — the only scope vsce's classic PAT auth
      # supports today. ⚠️ Microsoft has announced all-accessible-orgs PATs stop
      # working **December 2026** — this step will need to move to
      # `vsce publish --azure-credential` (Entra ID / OIDC, no PAT, no
      # expiration) before then. Tracked; not blocking today's setup.
      # Publishes the SAME .vsix just built (via --packagePath), not a fresh
      # vsce-driven build — keeps this identical to the artifact attached to
      # the GitHub Release below and to what `just _build-vsix` produces locally.
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME##*/v}"
          cd packages/vscode-ext && pnpm exec vsce publish \
            --packagePath "ttr-modeler-vsc-${VERSION}.vsix"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME##*/v}"
          gh release create "$GITHUB_REF_NAME" \
            "packages/vscode-ext/ttr-modeler-vsc-${VERSION}.vsix" \
            --title "VS Code extension v${VERSION}" \
            --notes "VS Code extension v${VERSION}. Also on the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=collite.ttr-modeler-vsc). Download the \`.vsix\` below and install it via the Extensions view → ⋯ → \"Install from VSIX…\"."

  intellij:
    if: startsWith(github.ref, 'refs/tags/intellij/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # IntelliJ plugin targets JDK 17 (build.gradle.kts: jvmToolchain(17)).
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - uses: extractions/setup-just@v3

      - run: pnpm install --frozen-lockfile

      - name: Build plugin .zip
        run: just _build-intellij

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME##*/v}"
          ZIP=$(ls intellij-plugin/build/distributions/*-"${VERSION}".zip)
          gh release create "$GITHUB_REF_NAME" \
            "$ZIP" \
            --title "IntelliJ plugin v${VERSION}" \
            --notes "IntelliJ IDEA plugin v${VERSION}. Download the \`.zip\` below and install it via Settings → Plugins → ⚙ → \"Install Plugin from Disk…\"."
