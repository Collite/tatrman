name: Publish TypeScript grammar (npm)

# Tag-driven release of the canonical TTR grammar to PUBLIC npmjs under the
# @tatrman scope — the open-kit registry per FO ⚑1 (RULED 2026-07-18: A-managed;
# open kit + grammar → public npmjs @tatrman; the former @collite GitHub-Packages
# rewrite is RETIRED at FO-P0.S3). TypeScript consumers depend on a published,
# versioned package instead of vendoring a frozen copy of TTR.g4 — the same
# distribution story Kotlin gets via Maven (publish.yml) and Python via PyPI
# (publish-python.yml). See PUBLISHING.md § TypeScript and
# docs/features/grammar-master/new-grammar-version-process.md §§6-7.
#
# Tag → package:
#   ts-grammar/v<x.y.z>   →   @tatrman/grammar   (packages/grammar), public npmjs
#
# EXTERNAL CUT IS GATED (FO ⚑2 ruling, Bora 2026-07-18: external publish only
# after the whole pipeline is set up and VALIDATED). This workflow only fires on
# a `ts-grammar/v*` tag push (a deliberate maintainer action) AND needs the
# `NPM_TOKEN` secret provisioned. FO-P0.S3 sets up + validates the machinery (the
# grammar-consumer-smoke CI job packs + installs the tarball locally, no publish);
# the first real public cut is a separate, deliberate step once Bora green-lights.

on:
  push:
    tags:
      - 'ts-grammar/v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # registry-url + scope make setup-node write the auth .npmrc that pnpm reads:
      #   @tatrman:registry=https://registry.npmjs.org/
      #   //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@tatrman'

      - run: pnpm install --frozen-lockfile

      # Runs the package's `prebuild` (extract-property-map.ts → generated/
      # {property-map,version}.ts from TTR.g4) then `tsc` → dist/. grammar is a
      # leaf package, so building it alone needs nothing else built first.
      - name: Build @tatrman/grammar
        run: pnpm --filter @tatrman/grammar run build

      - name: Derive version from the tag
        id: ver
        run: |
          version="${GITHUB_REF_NAME#ts-grammar/v}"
          # -RELEASE is a tag-level marker only (2026-07-16, justfile sync) — the
          # published version must be a bare x.y.z.
          version="${version%-RELEASE}"
          if [ -z "$version" ] || [ "$version" = "$GITHUB_REF_NAME" ]; then
            echo "::error::could not derive version from tag '$GITHUB_REF_NAME' (expected ts-grammar/v<x.y.z>)"
            exit 1
          fi
          # Version sync: @tatrman/grammar's <major.minor> must equal the grammar's
          # own @grammar-version (the patch digit is code-only). See
          # new-grammar-version-process.md §6.
          GRAMMAR_MM=$(grep -m1 -oE '@grammar-version:[[:space:]]*[0-9]+\.[0-9]+' packages/grammar/src/TTR.g4 | grep -oE '[0-9]+\.[0-9]+')
          if [ "${version%.*}" != "$GRAMMAR_MM" ]; then
            echo "::error::ts-grammar/v$version: minor ${version%.*} must equal @grammar-version $GRAMMAR_MM (new-grammar-version-process.md §6). Bump the grammar marker, or fix the tag."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing @tatrman/grammar $version (grammar $GRAMMAR_MM)"

      # Inject the tag version into the 0.0.0 placeholder. The name is already the
      # published name (@tatrman/grammar) — no rewrite needed under the @tatrman
      # scope on npmjs. Uses `npm pkg set` — pnpm 11 does NOT implement `pnpm pkg`
      # (ERR_PNPM_NOT_IMPLEMENTED). The repo copy is never committed with this value.
      - name: Set published version
        working-directory: packages/grammar
        run: npm pkg set version='${{ steps.ver.outputs.version }}'

      # Self-contained tarball guard (mirrors publish-python.yml's `unzip -l | grep`):
      # a consumer needs BOTH the raw .g4 (to regenerate its own parser) AND the
      # built exports (to import PROPERTY_MAP / TTR_GRAMMAR_VERSION). Fail loudly
      # if the `files` allow-list ever drops one. The grammar-consumer-smoke CI job
      # (ci.yml) runs this same pack + a real install on every PR, unpublished.
      - name: Verify the tarball is self-contained
        working-directory: packages/grammar
        run: |
          tarball="$(pnpm pack | tail -1)"
          echo "packed: $tarball"
          list="$(tar -tzf "$tarball")"
          echo "$list"
          echo "$list" | grep -qx 'package/src/TTR.g4'                    || { echo "::error::TTR.g4 missing from tarball"; exit 1; }
          echo "$list" | grep -qx 'package/src/generated/version.ts'      || { echo "::error::generated/version.ts missing from tarball"; exit 1; }
          echo "$list" | grep -qx 'package/src/generated/property-map.ts' || { echo "::error::generated/property-map.ts missing from tarball"; exit 1; }
          echo "$list" | grep -qx 'package/dist/index.js'                 || { echo "::error::dist/index.js missing from tarball"; exit 1; }
          tar -xzOf "$tarball" package/dist/index.js | grep -q 'TTR_GRAMMAR_VERSION' \
            || { echo "::error::dist/index.js does not re-export TTR_GRAMMAR_VERSION"; exit 1; }
          echo "Tarball is self-contained."

      # Public scoped package: first publish needs --access public. NPM_TOKEN is an
      # npmjs automation token with publish rights on the @tatrman scope (Bora
      # provisions once the tatrman npm org is claimed — bora-legal side item).
      - name: Publish to npmjs
        working-directory: packages/grammar
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
