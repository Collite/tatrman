name: Publish Kotlin artifacts

# Publishes the modeler-owned Kotlin artifacts (org.tatrman:ttr-parser,
# ttr-writer, and — from Phase 2 — ttr-semantics) to GitHub Packages.
# Tag-driven, mirroring ai-platform's publish flow. See PUBLISHING.md and
# docs/grammar-master/contracts.md §6.1.
#
# Tag → modules (one tag per module family — RO-24; no module has two publishers).
# Renamed 2026-07-16 (justfile sync) from the old kotlin*/v prefixes — tag
# prefixes now match either the module's own directory name or an explicit,
# human-named bundle:
#   grammar/v<x.y.z>     bundle: ttr-parser + ttr-writer + ttr-semantics   (was kotlin/v*)
#   ttr-parser/v<x.y.z>  ttr-parser only                                  (was kotlin-parser/v*)
#   ttr-semantics/v<x.y.z> ttr-semantics only                             (was kotlin-semantics/v*)
#   ttr-writer/v<x.y.z>  ttr-writer only                                  (was kotlin-writer/v*)
#   metadata/v<x.y.z>    bundle: ttr-metadata + ttr-metadata-git (lockstep; contracts §1) (was kotlin-metadata/v*)
#   translator/v<x.y.z>  bundle: ttr-plan-proto + ttr-translator (lockstep; ttr-translator
#                        extraction arc, docs/ttr-translator/architecture/contracts.md §5) (was kotlin-translator/v*)
#
# Lane gating (SV — Central quota, 2026-07-13; polarity flipped 2026-07-16): EVERY
# tag publishes to the GitHub Packages staging lane. A tag additionally publishes
# to Maven Central ONLY when it carries an explicit `-RELEASE` marker (e.g.
# `grammar/v1.0.0-RELEASE`) — the marker is stripped before the version reaches
# any registry (Central gets bare `1.0.0`, same as GH Packages). Un-marked bare
# tags (`grammar/v0.9.5`) are now internal-only: most cuts are fast-iteration
# internal patches, so a public release must be marked explicitly rather than
# inferred from the absence of a prerelease suffix. Central's free tier
# (~1,167 files / ~78 MB / ~7 releases per month, 3-month rolling average) still
# can't absorb fast-iteration publishing. See PUBLISHING.md § Release lanes.

on:
  push:
    tags:
      - 'grammar/v*'
      - 'ttr-parser/v*'
      - 'ttr-semantics/v*'
      - 'ttr-writer/v*'
      - 'metadata/v*'
      - 'translator/v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version + modules from tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          RAW_VERSION="${TAG##*/v}"
          # -RELEASE is a tag-level marker only — strip it before the version
          # reaches any registry. Its presence, not the absence of a prerelease
          # suffix, is what gates the Central lane (2026-07-16 polarity flip).
          if [[ "$RAW_VERSION" == *-RELEASE ]]; then
            PUBLIC=true
            VERSION="${RAW_VERSION%-RELEASE}"
          else
            PUBLIC=false
            VERSION="$RAW_VERSION"
          fi
          if [[ "$TAG" == ttr-parser/v* ]]; then
            MODULES=":packages:kotlin:ttr-parser:publish"
          elif [[ "$TAG" == ttr-semantics/v* ]]; then
            MODULES=":packages:kotlin:ttr-semantics:publish"
          elif [[ "$TAG" == ttr-writer/v* ]]; then
            MODULES=":packages:kotlin:ttr-writer:publish"
          elif [[ "$TAG" == metadata/v* ]]; then
            MODULES=":packages:kotlin:ttr-metadata:publish :packages:kotlin:ttr-metadata-git:publish"
          elif [[ "$TAG" == translator/v* ]]; then
            MODULES=":packages:kotlin:ttr-plan-proto:publish :packages:kotlin:ttr-translator:publish"
          else  # grammar/v* — the three grammar-toolchain modules ONLY.
                # ttr-metadata(-git) is published solely by metadata/v*
                # (RO-24: one publisher per family; the old bundle double-publish
                # was PUBLISHING.md Gotcha 6, retired at SV-P1·S1·T2).
            MODULES=":packages:kotlin:ttr-parser:publish :packages:kotlin:ttr-writer:publish :packages:kotlin:ttr-semantics:publish"
          fi
          # SV-P1 S4 — the GH Packages step MUST target the GH-Packages-specific
          # publish task, NOT the generic `publish` aggregate: vanniktech registers
          # a `mavenCentral` repository, so `publish` now also pulls in
          # `prepareMavenCentralPublishing`, which demands `mavenCentralUsername` —
          # absent in the GH Packages step (it only has the GITHUB_TOKEN) → the whole
          # step fails before the Central lane can run. The Central lane runs the
          # separate `publishAndReleaseToMavenCentral` aggregate (uploads one signed
          # bundle and auto-releases it — no manual portal click).
          GH_MODULES="${MODULES//:publish/:publishAllPublicationsToGitHubPackagesRepository}"
          CENTRAL="${MODULES//:publish/:publishAndReleaseToMavenCentral}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "modules=${GH_MODULES}" >> "$GITHUB_OUTPUT"
          echo "central=${CENTRAL}" >> "$GITHUB_OUTPUT"
          echo "public=${PUBLIC}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${VERSION} (public=${PUBLIC}); GH Packages: ${GH_MODULES}; Central: ${CENTRAL}"

      - name: Publish (GitHub Packages — staging lane)
        run: ./gradlew --no-configuration-cache -Pversion=${{ steps.ver.outputs.version }} ${{ steps.ver.outputs.modules }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SV-P1 S4 — public lane (RO-17). Uploads a signed bundle to the Central
      # Portal and AUTO-RELEASES it (`publishAndReleaseToMavenCentral`, enabled
      # 2026-07-12 after the first manual releases). Skipped until the four
      # credential secrets are set, so the GH Packages lane above stays green in
      # the interim. Secret names ARE the Gradle property names so they flow
      # straight through as `ORG_GRADLE_PROJECT_*` env.
      #
      # ALSO skipped unless the tag carried a `-RELEASE` marker (public=false
      # above) — un-marked internal patches stay on the GH Packages staging lane
      # to protect the Central monthly quota. Only a `-RELEASE` tag reaches Maven
      # Central, published there under the stripped bare x.y.z version.
      - name: Publish to Maven Central (Central Portal)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralUsername }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_mavenCentralPassword }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKey }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GRADLE_PROJECT_signingInMemoryKeyPassword }}
        if: ${{ env.ORG_GRADLE_PROJECT_mavenCentralUsername != '' && steps.ver.outputs.public == 'true' }}
        run: ./gradlew --no-configuration-cache -Pversion=${{ steps.ver.outputs.version }} ${{ steps.ver.outputs.central }}
