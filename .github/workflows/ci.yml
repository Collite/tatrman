name: CI

on:
  push:
    branches: [master, main, v0]
  pull_request:
    branches: [master, main, v0]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build
      - run: pnpm -r test
      - run: pnpm -r lint
      - run: cd packages/vscode-ext && pnpm run regen-tmgrammar && git diff --exit-code syntaxes/ttr.tmLanguage.json

  vscode-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build the extension AND its whole dependency chain (the `...` suffix) —
      # the smoke test resolves the LSP via `require.resolve('@tatrman/lsp/server-stdio')`,
      # so `packages/lsp`'s server bundle (and everything it needs) must be built,
      # not just the extension itself. Without this the LSP never starts and the
      # `before` hook times out waiting for workspace symbols.
      - run: pnpm --filter "ttr-modeler-vsc..." build

      - name: Run VS Code smoke tests
        run: xvfb-run -a pnpm --filter ttr-modeler-vsc test:smoke

  # Kotlin/Gradle build + test for the whole JVM domain: ttr-parser/writer/
  # semantics/metadata(+git)/designer-server AND the six TTR-P modules
  # (ttrp-{frontend,graph,emit,lsp,cli,conform}). `./gradlew build` compiles and
  # tests all of them — the plan's "build + test all new modules" (Stage 0.1).
  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build
