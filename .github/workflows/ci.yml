name: CI

on:
  push:
    branches: [master, main, v0]
  pull_request:
    branches: [master, main, v0]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build
      - run: pnpm -r test
      - run: pnpm -r lint
      - run: cd packages/vscode-ext && pnpm run regen-tmgrammar && git diff --exit-code syntaxes/ttrm.tmLanguage.json
      - run: cd packages/ttrp-vscode-ext && pnpm run regen-tmgrammar && git diff --exit-code syntaxes/ttrp.tmLanguage.json

  vscode-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build the extension AND its whole dependency chain (the `...` suffix) —
      # the smoke test resolves the LSP via `require.resolve('@tatrman/lsp/server-stdio')`,
      # so `packages/lsp`'s server bundle (and everything it needs) must be built,
      # not just the extension itself. Without this the LSP never starts and the
      # `before` hook times out waiting for workspace symbols.
      - run: pnpm --filter "ttr-modeler-vsc..." build

      - name: Run VS Code smoke tests
        run: xvfb-run -a pnpm --filter ttr-modeler-vsc test:smoke

  # Kotlin/Gradle build + test for the whole JVM domain: ttr-parser/writer/
  # semantics/metadata(+git)/designer-server, the six TTR-P modules
  # (ttrp-{frontend,graph,emit,lsp,cli,conform}), and the ttr-translator arc's
  # ttr-plan-proto (+ ttr-translator, from A2). `./gradlew build` compiles and
  # tests all of them — new modules are picked up via settings.gradle.kts.
  kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build

  # Persona gate for the PUBLISHABLE Kotlin/Python artifacts (naming ledger §4 N2,
  # made permanent at SV-P1·S1). The published org.tatrman:* jars + PyPI wheels
  # must carry no retired kantheon persona string — on a wire surface OR in
  # user-visible source/POM prose (these ship to Maven Central at SV-P1·S4).
  # Surviving personas (Veles/Perun/Charon, Golem/Pythia/Iris) are not in the
  # regex, so any hit is real → the job fails. `formerly` allows historical
  # provenance notes; the Prometheus exclusions cover legitimate monitoring.
  # NOTE: `echo` is intentionally NOT in the pattern here — the retired Echo
  # persona is a SERVER service (now ttr-fuzzy in tatrman-server), absent from
  # every tatrman publishable; the only `echo` in these packages is ttrp-cli's
  # Clikt output primitive + the bash it generates. The tatrman-server gate
  # keeps `echo\b` (with exclusions) because that repo owns the fuzzy service.
  # DCO gate (SV-P2·S2, RO-18): every non-merge commit in a PR must carry a
  # `Signed-off-by:` trailer (`git commit -s`). Agent-authored patches included —
  # the human submitter's sign-off carries the DCO. See CONTRIBUTING.md.
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: check Signed-off-by on every commit
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          missing=0
          while read -r sha; do
            [ -n "$sha" ] || continue
            if ! git show -s --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by trailer"
              missing=1
            fi
          done < <(git rev-list --no-merges "$base..$head")
          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed — sign off every commit with 'git commit -s' (see CONTRIBUTING.md)."
            exit 1
          fi
          echo "DCO: all commits signed off"

  # License-header gate (SV-P2·S1, RO-18): every tracked *.kt/*.kts/*.py/*.proto/*.ts
  # source file must carry `SPDX-License-Identifier: Apache-2.0` in its first 3 lines.
  # Generated (build/, **/generated/**, *_pb2*), vendored (**/vendor/**, the
  # grammars-v4 pg base) and third-party samples (docs/**/examples/** — byx=MIT,
  # kyx=Alteryx) are excluded. `scripts/add-spdx.sh` applies the header idempotently.
  spdx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: enforce SPDX license headers
        run: bash scripts/check-spdx.sh

  persona-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: enforce no retired personas in publishable sources
        run: |
          matches=$(grep -rn -iE 'ariadne|theseus|proteus|argos|kyklop|\barges|brontes|steropes|kadmos|prometheus' \
            packages/kotlin packages/python \
            --include='*.kt' --include='*.kts' --include='*.py' --include='*.proto' \
            --include='*.conf' --include='*.yaml' --include='*.toml' --include='Dockerfile*' \
            | grep -viE '/build/|/generated/|README|CHANGELOG|formerly|Forked 2026' \
            | grep -viE 'PrometheusMeterRegistry|PrometheusConfig|MeterRegistry|micrometer|/metrics|monitoring|prometheus (meter|call|scrape|registry|endpoint)|prometheus-client|prometheus_client|PromQL|"prometheus"|Prometheus (metrics|exposition|scrape|client)' \
            || true)
          if [ -n "$matches" ]; then
            echo "::error::retired persona string in a publishable artifact source (naming ledger §4/§5):"
            echo "$matches" | head -50
            exit 1
          else
            echo "persona-gate: clean"
          fi

  # The docs site build gate (SV-P4·S1·T1, RO-27 ②). `--strict` turns broken nav
  # entries, dead internal links, and bad anchors into build failures — this is the
  # standing test for every docs commit, and the reason the site can carry the RO-3
  # bar's "from public docs alone" clause. Source dir is `docs-site/` (RO-27 ③: one
  # site, one build, the site documents the ecosystem). `mike` is installed here too
  # so the deploy job (docs-publish.yml) and this gate resolve the same versions.
  docs-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install -r docs-site/requirements.txt
      - name: build the site (strict)
        run: mkdocs build --strict
        working-directory: docs-site

      # The site/repo-docs boundary (SV-P4·S1·T5, docs-dx §4). `--strict` cannot
      # catch this class: a relative link escaping into docs/features/ resolves
      # on a laptop and 404s once the site is served standalone.
      - name: enforce the site/repo-docs boundary
        run: bash scripts/check-docs-site-boundary.sh

  # Phase 4 chain: the TTR-P LSP (Kotlin) + the stdio contract the VS Code extension
  # relies on. Ordered: ttrp-lsp:test → installDist → the stdio integration suite (which
  # runIf-gates on the launcher, so it actually executes here) → the extension build+test.
  ttrp-lsp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: ./gradlew :packages:kotlin:ttrp-lsp:test :packages:kotlin:ttrp-lsp:installDist
      - run: pnpm --filter @tatrman/integration-tests exec vitest run src/ttrp-lsp-stdio.test.ts
      - run: pnpm --filter @tatrman/ttrp-vscode-ext build
      - run: pnpm --filter @tatrman/ttrp-vscode-ext test
