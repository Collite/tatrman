name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Core changes (language / contracts / plan hub) go
        through the public RFC process — see [GOVERNANCE.md](../blob/master/GOVERNANCE.md).
        This form is a fine place to start the conversation.
  - type: dropdown
    id: track
    attributes:
      label: Which part of Tatrman?
      options:
        - Language (TTR-M / TTR-P / grammar / semantics)
        - Server (services, MCP surface, contracts, plan)
        - Toolchain (parser/writer, IDE, Designer, CLI)
        - Docs / DX
        - Not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do, and where does Tatrman get in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Alternatives you considered?
    validations:
      required: false
  - type: checkboxes
    id: scope-honesty
    attributes:
      label: Scope check
      description: >
        Some requests are whole product lines in disguise. If this smells like a
        large, separable capability, it may belong on the parking lot rather than
        the near-term roadmap — that's fine, say so.
      options:
        - label: This might be a large / separable capability (a "parked satellite"), not a small change.
