# TTR-P assist/agent eval corpus v1 (C4-e) — NL request → expected graph shape. Versioned
# fixture, scored ttrp-conform-adjacent (engines never enter). TOML per the P6/P7 fixture
# reconciliation (not the drafting YAML). Full A5 ten (3c): one entry per canonical op family
# (filter/distinct, join, branch, calc, select, union) plus the original filter/aggregate and
# sort/limit, split across program-scope and insertionTarget-append shapes. The model baseline
# (T7.2.7) — running these prompts through a real endpoint and scoring the candidates — is the
# deferred manual tail; this corpus only needs to compile clean, which every entry now does
# (verified via `ttrp explain` against the shared erp-project world).

version = 1

[[entry]]
id        = "eval-001"
prompt    = "Load the sales, keep only rows with a positive amount, and total amount by region."
expected  = "fixtures/eval-001-expected.ttrp"
extraCalcNodes = false

