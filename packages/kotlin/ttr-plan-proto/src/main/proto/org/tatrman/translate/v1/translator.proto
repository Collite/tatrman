// SPDX-License-Identifier: Apache-2.0
// =============================================================================
// translate.v1 — translator library types (forked from ai-platform translator.proto)
//
// Library-only proto: the engine enums (Language / SqlDialect) consumed by the
// translator library and the `translate.v1` service (contracts §4). The full gRPC
// service surface imports these enums from this artifact — one package, two source
// homes, no duplicate types.
//
// Forked 2026-06-13 from `ai-platform@2575b923` (`cz/dfpartner/translator/v1/translator.proto`).
// Renamed to translate.v1 in SV-P0 (was the persona package; RO-20, ledger §3) — off the wire.
// =============================================================================

syntax = "proto3";

package org.tatrman.translate.v1;

option java_package = "org.tatrman.translate.v1";
option java_multiple_files = true;

// Source language for the translator.
enum Language {
    LANGUAGE_UNSPECIFIED = 0;
    SQL                  = 1;
    TRANSFORMATION_DSL   = 2;
    DATAFRAME_DSL        = 3;
    REL_NODE             = 4;
}

// SQL dialects. v1 emits MS SQL by default; POSTGRESQL / MYSQL_MARIADB / DUCKDB are wired
// through `Dialects.byCode` and the unparser (Phase 08 A3 / DF-T04 in the ai-platform history).
enum SqlDialect {
    SQL_DIALECT_UNSPECIFIED = 0;
    MSSQL                   = 1;
    POSTGRESQL              = 2;
    MYSQL_MARIADB           = 3;
    DUCKDB                  = 4;
    // SQLITE reserved
    reserved 5 to 10;
}
