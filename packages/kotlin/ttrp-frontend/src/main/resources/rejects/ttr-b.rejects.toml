# TTR-B reject table v1 — contracts §8. Versioned fixture: every entry has a corpus
# fixture; every TTRP-B reject diagnostic + the shared TTRP-EQ-001 has an entry. Doubles
# as the assist repair vocabulary (C4-b-iii, C4-d) consumed by Stage 7.2. Reviewable.
#
# Detection is deterministic (P2 — no NLP): sentence-initial token class, adjacent comment
# lexis, non-ASCII (UNMATCHED) token, `is <word> <operand>` unknown-verbose window.

[[reject]]
id       = "TTRP-B-001"
form     = "sentence-initial UPDATE"
example  = "Update accounts set status to 'closed'."
message  = "TTR-B has no update — data writes are Store."
suggest  = "Store <name> to <model-ref>."
decision = "C4-b"

[[reject]]
id       = "TTRP-B-002"
form     = "sentence-initial INSERT"
example  = "Insert into accounts …"
message  = "TTR-B has no insert — data writes are Store; row addition is Combine."
suggest  = "Combine <name> with <name>. / Store <name> to <model-ref>."
decision = "C4-b"

[[reject]]
id       = "TTRP-B-003"
form     = "sentence-initial DROP | TRUNCATE | ALTER"
example  = "Drop the accounts table."
message  = "TTR-B has no DDL."
suggest  = "Model changes belong in TTR-M; data writes are Store."
decision = "C4-b"

[[reject]]
id       = "TTRP-B-004"
form     = "sentence-initial word not in the verb roster (catch-all)"
example  = "Frobnicate the accounts."
message  = "Not a TTR-B sentence. The v1 roster: Load, Keep/Take/Select, Remove/Delete, Rename, Convert/Retype, Create/Compute, Summarize, Join, Sort, Combine/Append, Store, Show/Display."
suggest  = "Start the sentence with a roster verb."
decision = "C4-b"

[[reject]]
id       = "TTRP-B-005"
form     = "'//' or '/*' comment lexis"
example  = "// a C-style comment"
message  = "TTR-B comments use # (S19)."
suggest  = "Replace // with #."
decision = "S19"

[[reject]]
id       = "TTRP-B-006"
form     = "non-ASCII letter in sentence-verb position"
example  = "Shrň součet za region."
message  = "TTR-B v1 is English-only (S20)."
suggest  = "Write the sentence with the English v1 roster."
decision = "S20"

[[reject]]
id       = "TTRP-B-007"
form     = "comparison phrase not in the verbose synonym table"
example  = "Keep rows where amount is roughly 100."
message  = "Not in the TTR-B verbose comparison table (C4-c — closed, never fuzzy)."
suggest  = "Use a listed verbose form or the canonical operator."
decision = "C4-c"

[[reject]]
id       = "TTRP-B-008"
form     = "sentence-initial PIVOT"
example  = "Pivot the sales by region."
message  = "Pivot authoring is canonical-DSL-only in v1 (C2-b)."
suggest  = "Author the Pivot node in canonical TTR-P."
decision = "C2-b"

# Shared canonical diagnostic (S9) surfaced by the TTR-B scanner too — `==` is rejected
# everywhere except TTR-pandas. Kept here so the reject spec reads its suggestion from one
# source; the id/area stay EQ (not a new B id).
[[reject]]
id       = "TTRP-EQ-001"
form      = "== used as equality"
example  = "… where status == 'open'."
message  = "`==` is not equality in TTR-B (S9)."
suggest  = "use ="
decision = "S9"
