# TTRP-RJ-007 — canonical validity for op.div (RJ-P0). Guards the EVALUATED denominator,
# not a text form: no regex, no trim. Corpus values are evaluated numerics for conform.
function: op.div
typePair: numeric,numeric->numeric
code: TTRP-RJ-007
pure: true
domain:
  kind: predicate
  predicate: denominator != 0
corpus:
  accept: ["1", "-3", "0.5", "9223372036854775807"]
  reject: ["0", "0.0", "-0", "0.0000"]
  null_is_success: true
