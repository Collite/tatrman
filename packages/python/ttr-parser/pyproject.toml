[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ttr-parser"
version = "0.0.0"
description = "Parser, walker and reference resolver for the TTR modeling language"
readme = "README.md"
requires-python = ">=3.13"
license = { text = "Apache-2.0" }
authors = [
  { name = "modeler maintainers" },
]
keywords = ["ttr", "parser", "modeling", "antlr"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Compilers",
  "Topic :: Software Development :: Interpreters",
]
dependencies = [
  "antlr4-python3-runtime==4.13.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.6",
  "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/Collite/modeler"
Issues = "https://github.com/Collite/modeler/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/ttr_parser"]
# _generated/ (the ANTLR parser) and semantics/stock/ (the canonical CNC vocab)
# are produced/copied by the build hook and gitignored in the source tree (D4).
# Declaring them as `artifacts` patterns guarantees they ship in the wheel even
# though VCS ignores them — and, unlike `force-include`, this composes with the
# `packages` selection above instead of double-adding.
artifacts = [
  "src/ttr_parser/_generated/**",
  "src/ttr_parser/semantics/stock/**",
]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.ruff]
extend-exclude = ["src/ttr_parser/_generated", "dist", "build"]
line-length = 110
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.13"
strict = true
exclude = [
  "_generated/",
  "^dist/",
  "^build/",
  "^tests/",
]
exclude_gitignore = true

[[tool.mypy.overrides]]
module = ["antlr4.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
